<title>英语学习助手 · CET-4</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f0; --card:#fff; --text:#2c2c28; --sub:#6b6b60;
  --accent:#e8593a; --accent2:#3a89c8; --green:#3a9d5e; --gold:#d4a030;
  --border:#e0ded5; --shadow:0 2px 12px rgba(0,0,0,.06);
  --correct:#e6f5ea; --wrong:#fde8e5; --selected:#e8f0fa;
}
body{
  font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh;
  display:flex; justify-content:center;
}
.app{width:100%;max-width:720px;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.header{
  background:var(--card); padding:16px 20px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:10;
}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.02em}
.header h1 span{color:var(--accent)}
.stats-row{display:flex;gap:16px;font-size:13px;color:var(--sub)}
.stats-row b{color:var(--text)}

/* Tabs */
.tabs{
  display:flex; background:var(--card); border-bottom:1px solid var(--border);
  position:sticky; top:57px; z-index:10;
}
.tab{
  flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:600;
  color:var(--sub);cursor:pointer;border-bottom:3px solid transparent;
  transition:all .15s; user-select:none;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-icon{display:block;font-size:20px;margin-bottom:2px}

/* Main content */
.main{flex:1;padding:20px;overflow-y:auto}

/* Card */
.card{background:var(--card);border-radius:16px;padding:28px 24px;margin-bottom:16px;box-shadow:var(--shadow)}
.word-display{font-size:42px;font-weight:700;text-align:center;padding:24px 0;letter-spacing:-.01em;color:var(--text)}
.word-phonetic{text-align:center;font-size:14px;color:var(--sub);margin-top:-20px;margin-bottom:8px}
.sentence-display{font-size:20px;line-height:1.7;text-align:center;padding:16px 0;color:var(--text)}
.sentence-display .blank{color:var(--accent);font-weight:700;border-bottom:3px solid var(--accent);padding:0 8px;min-width:80px;display:inline-block}
.category-tag{display:inline-block;font-size:11px;padding:4px 10px;border-radius:20px;background:#f0ede5;color:var(--sub);margin-bottom:12px}

/* Options */
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.option{
  padding:14px 16px;border:2px solid var(--border);border-radius:12px;
  font-size:15px;cursor:pointer;transition:all .2s;background:var(--card);
  text-align:center; user-select:none;line-height:1.4;
}
.option:hover{border-color:var(--accent2);background:var(--selected)}
.option.correct{border-color:var(--green);background:var(--correct);color:#1a5830}
.option.wrong{border-color:var(--accent);background:var(--wrong);color:#8b1a1a}
.option:disabled{pointer-events:none}

/* Feedback */
.feedback{
  text-align:center;padding:16px;margin-top:12px;border-radius:12px;
  font-weight:600;display:none;font-size:15px;
}
.feedback.show{display:block}
.feedback.correct{background:var(--correct);color:#1a5830}
.feedback.wrong{background:var(--wrong);color:#8b1a1a}

/* Buttons */
.btn{
  display:inline-block;padding:12px 28px;border:none;border-radius:25px;
  font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;
  text-align:center;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{background:#eee;color:var(--text)}
.btn-secondary:hover{background:#ddd}
.btn-small{padding:8px 16px;font-size:13px;border-radius:20px}

.btn-row{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}

/* Word Book */
.word-list{display:flex;flex-direction:column;gap:6px}
.word-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:var(--card);border-radius:10px;
  border:1px solid var(--border);gap:10px;
}
.word-item .eng{font-weight:700;font-size:16px}
.word-item .chn{color:var(--sub);font-size:14px;flex:1}
.word-item .pos{font-size:11px;color:var(--accent2);background:#e8f0fa;padding:2px 8px;border-radius:10px}
.word-count{text-align:center;color:var(--sub);font-size:13px;padding:8px}
.empty-state{text-align:center;padding:40px;color:var(--sub)}
.empty-state .icon{font-size:48px;display:block;margin-bottom:8px}

/* Progress */
.progress-bar{height:6px;background:var(--border);border-radius:3px;margin:8px 0;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}

/* Filter chips */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:6px 14px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);transition:.15s}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip:hover:not(.active){border-color:var(--accent2)}

/* Review flashcard */
.flashcard{perspective:800px;height:200px;cursor:pointer;margin:16px 0}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d}
.flashcard-inner.flipped{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{
  position:absolute;inset:0;backface-visibility:hidden;
  display:flex;align-items:center;justify-content:center;
  border-radius:16px;font-size:24px;font-weight:700;
}
.flashcard-front{background:var(--card);border:2px solid var(--border)}
.flashcard-back{background:var(--accent2);color:#fff;transform:rotateY(180deg);font-size:18px;flex-direction:column;gap:4px}
.flashcard-back small{font-size:13px;opacity:.8}

@media(max-width:500px){
  .options{grid-template-columns:1fr}
  .word-display{font-size:32px}
  .sentence-display{font-size:17px}
  .tab{font-size:11px}.tab-icon{font-size:16px}
  .stats-row{font-size:11px;gap:8px}
}
</style>

// ============================================================
//  HELPER: shuffle array
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================================
//  GENERATE WORD QUIZ
// ============================================================
function generateWordQuiz() {
  // Pick a random word as the question
  const correctIdx = Math.floor(Math.random() * VOCAB.length);
  const correct = VOCAB[correctIdx];

  // Pick 3 random distractors (different words)
  const distractors = [];
  const usedIdx = new Set([correctIdx]);
  while (distractors.length < 3) {
    const idx = Math.floor(Math.random() * VOCAB.length);
    if (!usedIdx.has(idx)) {
      usedIdx.add(idx);
      distractors.push(VOCAB[idx][1]); // Chinese meaning
    }
  }

  const options = shuffle([
    { text: correct[1], correct: true },
    ...distractors.map(d => ({ text: d, correct: false }))
  ]);

  return {
    type: 'word',
    question: correct[0],
    phonetic: correct[2],
    answer: correct[1],
    options,
    wordData: correct,
  };
}

// ============================================================
//  GENERATE FILL-IN-BLANK QUIZ
// ============================================================
function generateFillQuiz() {
  const item = FILL_BLANKS[Math.floor(Math.random() * FILL_BLANKS.length)];
  const [sentence, correct, ...distractors] = item;
  const options = shuffle([
    { text: correct, correct: true },
    ...distractors.map(d => ({ text: d, correct: false }))
  ]);
  return {
    type: 'fill',
    question: sentence.replace('___', '<span class="blank">______</span>'),
    answer: correct,
    options,
    rawSentence: sentence,
  };
}

// ============================================================
//  GENERATE SENTENCE COMPREHENSION QUIZ
// ============================================================
function generateSentenceQuiz(category = null) {
  let pool = SENTENCES;
  if (category && category !== 'all') {
    pool = SENTENCES.filter(s => s[4] === category);
  }
  const item = pool[Math.floor(Math.random() * pool.length)];
  const [english, chinese, wrong1, wrong2, cat] = item;
  const options = shuffle([
    { text: chinese, correct: true },
    { text: wrong1, correct: false },
    { text: wrong2, correct: false },
  ]);
  return {
    type: 'sentence',
    question: english,
    answer: chinese,
    options,
    category: cat,
  };
}

// ============================================================
//  ANSWER HANDLING
// ============================================================
function selectOption(index, question, type) {
  if (state.answered) return;
  state.answered = true;
  state.total++;

  const isCorrect = question.options[index].correct;
  const feedback = document.getElementById('feedback');
  const allOpts = document.querySelectorAll('.option');

  allOpts.forEach(o => o.disabled = true);

  if (isCorrect) {
    state.correct++;
    state.streak++;
    feedback.className = 'feedback correct show';
    feedback.textContent = `✅ 正确! ${['👍 太棒了','🌟 继续保持','💪 干得好','👏 准确无误','✨ 完美'][Math.floor(Math.random()*5)]}`;
    allOpts[index].classList.add('correct');
  } else {
    state.streak = 0;
    feedback.className = 'feedback wrong show';
    feedback.textContent = `❌ 错误。正确答案是: ${question.answer}`;
    allOpts[index].classList.add('wrong');
    // Highlight correct answer
    question.options.forEach((opt, i) => {
      if (opt.correct) allOpts[i].classList.add('correct');
    });
  }

  // Record history
  state.history.push({
    type, question: question.question, answer: question.answer,
    correct: isCorrect, time: Date.now(),
  });
  if (state.history.length > 500) state.history = state.history.slice(-300);

  save();
  updateStats();
}

// ============================================================
//  WORD BOOK
// ============================================================
function addToWordBook() {
  const q = state.currentQuestion;
  if (!q) return;
  let word, meaning;
  if (q.type === 'word') {
    word = q.question;
    meaning = `${q.answer} (${q.phonetic})`;
  } else if (q.type === 'fill') {
    word = q.answer;
    meaning = `出自: ${q.rawSentence}`;
  } else return;

  const exists = state.wordBook.find(w => w.word === word);
  if (exists) {
    alert(`"${word}" 已经在单词本中了！`);
    return;
  }
  state.wordBook.push({ word, meaning, added: Date.now() });
  save();
  alert(`✅ "${word}" 已加入单词本！`);
}

function renderWordBook() {
  state.wordBook = JSON.parse(localStorage.getItem('en_wordbook') || '[]');

  let html = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3 style="font-size:18px;">📒 我的单词本</h3>
        <span class="chip" style="background:var(--accent);color:#fff">${state.wordBook.length} 个单词</span>
      </div>
    </div>
  `;

  if (state.wordBook.length === 0) {
    html += `<div class="empty-state"><span class="icon">📭</span><p>还没有单词，去答题时点击"加入单词本"吧！</p></div>`;
  } else {
    html += `<div class="word-list">`;
    [...state.wordBook].reverse().forEach((w, i) => {
      html += `
        <div class="word-item">
          <div>
            <span class="eng">${w.word}</span>
            <div style="font-size:12px;color:var(--sub);margin-top:2px;">${w.meaning}</div>
          </div>
          <button class="btn btn-small btn-secondary" onclick="removeWord(${state.wordBook.length - 1 - i})">✕</button>
        </div>
      `;
    });
    html += `</div>`;
    html += `
      <div class="btn-row" style="margin-top:16px;">
        <button class="btn btn-secondary" onclick="exportWordBook()">📤 导出</button>
        <button class="btn btn-secondary" onclick="importWordBookPrompt()">📥 导入</button>
        <button class="btn btn-secondary" onclick="clearWordBook()">🗑️ 清空</button>
      </div>
    `;
  }

  main.innerHTML = html;
}

function removeWord(index) {
  state.wordBook.splice(index, 1);
  save();
  renderWordBook();
}

function clearWordBook() {
  if (confirm('确定要清空整个单词本吗？此操作不可恢复。')) {
    state.wordBook = [];
    save();
    renderWordBook();
  }
}

function exportWordBook() {
  const data = JSON.stringify(state.wordBook, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `单词本_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function importWordBookPrompt() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data)) {
          state.wordBook = data;
          save();
          renderWordBook();
          alert(`导入成功！共 ${data.length} 个单词。`);
        } else { alert('格式错误！'); }
      } catch (err) { alert('文件解析失败！'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ============================================================
//  REVIEW MODE (Flashcard)
// ============================================================
function renderReview() {
  state.wordBook = JSON.parse(localStorage.getItem('en_wordbook') || '[]');

  if (state.wordBook.length === 0) {
    main.innerHTML = `<div class="empty-state"><span class="icon">📭</span><p>单词本为空，先去学习并添加单词吧！</p></div>`;
    return;
  }

  let reviewIndex = 0;
  let isFlipped = false;

  function showCard() {
    const word = state.wordBook[reviewIndex];
    main.innerHTML = `
      <div class="card">
        <div style="text-align:center;color:var(--sub);font-size:13px;margin-bottom:8px;">
          🔄 复习 ${reviewIndex + 1} / ${state.wordBook.length}
        </div>
        <div class="flashcard" onclick="flipCard()">
          <div class="flashcard-inner" id="flashcardInner">
            <div class="flashcard-front">${word.word}</div>
            <div class="flashcard-back">
              ${word.meaning}
              <small>点击翻转</small>
            </div>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="prevCard()">⬅ 上一个</button>
          <button class="btn btn-primary" onclick="nextCard()">下一个 ➡</button>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${((reviewIndex+1)/state.wordBook.length)*100}%"></div></div>
      </div>
    `;
    window._reviewIndex = reviewIndex;
    isFlipped = false;
  }

  window.flipCard = function() {
    const inner = document.getElementById('flashcardInner');
    isFlipped = !isFlipped;
    inner.classList.toggle('flipped', isFlipped);
  };

  window.nextCard = function() {
    reviewIndex = (window._reviewIndex + 1) % state.wordBook.length;
    showCard();
  };

  window.prevCard = function() {
    reviewIndex = (window._reviewIndex - 1 + state.wordBook.length) % state.wordBook.length;
    showCard();
  };

  showCard();
}

// ============================================================
//  NAVIGATION
// ============================================================
function nextQuestion(type) {
  state.currentQuestion = null;
  if (type === 'word') renderWordQuiz();
  else if (type === 'fill') renderFillQuiz();
  else if (type === 'sentence') renderSentenceQuiz();
}

function switchSentenceCat(cat) {
  sessionStorage.setItem('sentence_cat', cat);
  state.currentQuestion = generateSentenceQuiz(cat === 'all' ? null : cat);
  renderSentenceQuiz();
}

function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  state.currentQuestion = null;

  if (tab === 'word') renderWordQuiz();
  else if (tab === 'fill') renderFillQuiz();
  else if (tab === 'sentence') renderSentenceQuiz();
  else if (tab === 'review') renderReview();
  else if (tab === 'book') renderWordBook();
}

// ---- Event listeners ----
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', (e) => {
  if (state.answered) return;
  const keys = ['1','2','3','4','a','b','c','d'];
  const idx = keys.indexOf(e.key.toLowerCase());
  if (idx >= 0 && idx < 4) {
    const opts = document.querySelectorAll('.option');
    if (opts[idx]) opts[idx].click();
  }
});

// ---- Init ----
updateStats();
renderWordQuiz();

console.log('📚 英语学习助手已就绪 · CET-4 词库 ' + VOCAB.length + ' 词');
console.log('💡 提示：答题时可按键盘 1-4 / A-D 快速选择');
