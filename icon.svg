<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8593a"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <g transform="translate(156,100)">
    <!-- Book -->
    <rect x="0" y="20" width="200" height="260" rx="12" fill="#fff" opacity="0.95"/>
    <rect x="10" y="30" width="180" height="240" rx="4" fill="#f8f5f0"/>
    <!-- Book spine -->
    <rect x="0" y="20" width="20" height="260" rx="12" fill="#e0d5c0"/>
    <!-- Lines on pages -->
    <rect x="30" y="60" width="140" height="14" rx="7" fill="#d0c8b8"/>
    <rect x="30" y="90" width="120" height="14" rx="7" fill="#d0c8b8"/>
    <rect x="30" y="120" width="130" height="14" rx="7" fill="#d0c8b8"/>
    <rect x="30" y="150" width="100" height="14" rx="7" fill="#d0c8b8"/>
    <!-- Page curl -->
    <path d="M190,30 L200,40 L200,30 Z" fill="#e8e0d0"/>
  </g>
  <!-- Sparkle -->
  <circle cx="340" cy="140" r="16" fill="#ffd700" opacity="0.6"/>
  <circle cx="370" cy="160" r="10" fill="#ffd700" opacity="0.4"/>
  <circle cx="320" cy="170" r="8" fill="#ffd700" opacity="0.5"/>
</svg>
